services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1pass
      POSTGRES_DB: f1db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user -d f1db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: f1db
      SECRET_KEY: change-me-in-production
      ALGORITHM: HS256
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ff1cache:/app/cache

  streamlit:
    build: ./frontend-prototype
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:8080
    depends_on:
      - backend

  nextjs:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend


volumes:
  pgdata:
  ff1cache:

