name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        # Only install what tests need — fastf1/streamlit/scipy are mocked or unused in tests
        run: |
          pip install uv
          uv pip install --system \
            "fastapi>=0.115.0" \
            "sqlmodel>=0.0.22" \
            "python-jose[cryptography]" \
            "passlib[bcrypt]" \
            "python-multipart" \
            "uvicorn" \
            "httpx" \
            "pytest" \
            "python-dotenv" \
            "psycopg2-binary"

      - name: Run tests
        run: pytest tests/ -v
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_HOST: localhost
          POSTGRES_DB: testdb
          POSTGRES_PORT: 5432
          SECRET_KEY: ci-test-secret-key
          ALGORITHM: HS256

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type-check and build
        # NEXT_PUBLIC_API_URL intentionally empty — client components use relative
        # /api/* URLs proxied by vercel.json; server components use API_URL (server-only)
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: myf1circle-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: myf1circle-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
