name: Deploy

on:
  push:
    branches: [main]

# Required for OIDC — GitHub runner proves its identity to AWS IAM
# without any long-lived access keys stored as secrets
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: myf1circle-backend
  ECR_FRONTEND_REPO: myf1circle-frontend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # OIDC: runner requests a JWT from GitHub → AWS IAM verifies it →
      # runner temporarily assumes the IAM role (no access key stored)
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-myf1circle
          aws-region: ${{ env.AWS_REGION }}

      # Fetches a temporary 12-hour Docker password using the assumed role
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} \
            -t $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:latest \
            ./backend
          docker push $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }} --all-tags

      - name: Deploy to EC2 via SSH
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Sync compose file so restart policies and config stay version-controlled
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            deploy/docker-compose.yml \
            ec2-user@${{ secrets.EC2_HOST }}:/opt/myf1circle/docker-compose.yml

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY && \
             docker pull $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} && \
             cd /opt/myf1circle && IMAGE_TAG=${{ github.sha }} ECR_REGISTRY=$ECR_REGISTRY docker compose up -d"
          rm -f /tmp/deploy_key

  # Frontend is deployed automatically by Vercel on every push to main
  # (Vercel GitHub integration watches the repo — no workflow step needed)
  # Vercel env vars required in project settings:
  #   API_URL=http://<EC2-IP>:8080          (server-only, for SSR fetches)
  #   NEXT_PUBLIC_API_URL=                   (empty — client uses /api/* proxy)
  # vercel.json rewrites /api/* → http://<EC2-IP>:8080/api/* server-side
