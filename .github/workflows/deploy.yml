name: Deploy

on:
  push:
    branches: [main]

# Required for OIDC — GitHub runner proves its identity to AWS IAM
# without any long-lived access keys stored as secrets
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: myf1circle-backend
  ECR_FRONTEND_REPO: myf1circle-frontend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # OIDC: runner requests a JWT from GitHub → AWS IAM verifies it →
      # runner temporarily assumes the IAM role (no access key stored)
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-myf1circle
          aws-region: ${{ env.AWS_REGION }}

      # Fetches a temporary 12-hour Docker password using the assumed role
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} \
            -t $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:latest \
            ./backend
          docker push $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }} --all-tags

      # SSM Session Manager: runs commands on EC2 via IAM — no port 22, no SSH key
      # All output is logged to CloudWatch automatically
      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY',
              'docker pull $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}',
              'cd /home/ec2-user/myf1circle && IMAGE_TAG=${{ github.sha }} docker compose up -d backend'
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-myf1circle
          aws-region: ${{ env.AWS_REGION }}

      # Amplify builds Next.js server-side natively (SSR support built-in)
      # Disable Amplify's GitHub auto-build in the console so this is the only trigger
      - name: Trigger Amplify deployment
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --branch-name main \
            --job-type RELEASE \
            --query "jobSummary.jobId" \
            --output text)

          echo "Amplify job: $JOB_ID"
          aws amplify wait job-completed \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --branch-name main \
            --job-id "$JOB_ID"
